<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dar Nūr — Étiquette Miel de Nigelle V3 (charte v1)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  html,body{margin:0;height:100%;}
  body{
    background:radial-gradient(circle at 50% 38%, #efece4 0%, #e4e0d6 60%, #d8d3c6 100%);
    display:flex;align-items:center;justify-content:center;
    font-family:'Cinzel',serif;
  }
  .stage{padding:60px;}
  .label{ width:560px;height:560px; filter:drop-shadow(0 30px 60px rgba(0,0,0,.28)); }
</style>
</head>
<body>
<div class="stage">
  <svg class="label" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#dcc079"/>
        <stop offset="0.5" stop-color="#c8a84b"/>
        <stop offset="1" stop-color="#b9963c"/>
      </linearGradient>
    </defs>

    <!-- CHAMP : disque vert profond (INCHANGÉ) -->
    <circle cx="500" cy="500" r="500" fill="#0d1f16"/>

    <!-- FILET DORÉ UNIQUE (INCHANGÉ) -->
    <circle cx="500" cy="500" r="472" fill="none" stroke="url(#gold)" stroke-width="2.5" opacity="0.92"/>

    <!-- ===== TIER ① LA MAISON : LOGO OFFICIEL foil — V3 : -12,7% et remonté de 16px ===== -->
    <!-- V2 was: x=350 y=108 w=300 h=300  |  V3: x=369 y=92 w=262 h=262 -->
    <image href="logo-gold.png" x="369" y="92" width="262" height="262"/>

    <!-- ===== TIER ② LE PRODUIT (héros absolu — INCHANGÉ) ===== -->
    <text x="500" y="506" text-anchor="middle" fill="#f4efe4"
          font-family="Cinzel, serif" font-weight="500" font-size="26" letter-spacing="5">MIEL DE</text>
    <text x="500" y="590" text-anchor="middle" fill="#f4efe4"
          font-family="Cinzel, serif" font-weight="600" font-size="74" letter-spacing="4.5">NIGELLE</text>

    <!-- ===== TIER ③ LES FAITS (PRÉPARÉ EN FRANCE inchangé vs V2) ===== -->
    <text x="500" y="708" text-anchor="middle" fill="#f4efe4"
          font-family="Cinzel, serif" font-weight="500" font-size="20" letter-spacing="4">PRÉPARÉ EN FRANCE</text>
    <text x="500" y="760" text-anchor="middle" fill="#f4efe4"
          font-family="Cinzel, serif" font-weight="500" font-size="26" letter-spacing="4.5">200 g</text>
  </svg>
</div>
</body>
</html>
