<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dar Nūr — Comparaison V3 vs V4</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  html,body{margin:0;}
  body{background:#cfcabd;font-family:'Cinzel',serif;display:flex;justify-content:center;align-items:flex-start;padding:34px 10px;gap:34px;}
  .col{display:flex;flex-direction:column;align-items:center;gap:14px;}
  .cap{font-size:15px;letter-spacing:3px;color:#3a3a32;}
  .sub{font-size:11px;letter-spacing:1px;color:#6b6256;font-family:sans-serif;}
  .label{ width:380px;height:380px; filter:drop-shadow(0 18px 36px rgba(0,0,0,.26)); }
</style>
</head>
<body>
  <div class="col">
    <div class="cap">V3</div>
    <svg class="label" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="g3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#dcc079"/><stop offset="0.5" stop-color="#c8a84b"/><stop offset="1" stop-color="#b9963c"/></linearGradient></defs>
      <circle cx="500" cy="500" r="500" fill="#0d1f16"/>
      <circle cx="500" cy="500" r="472" fill="none" stroke="url(#g3)" stroke-width="2.5" opacity="0.92"/>
      <image href="logo-gold.png" x="369" y="92" width="262" height="262"/>
      <text x="500" y="506" text-anchor="middle" fill="#f4efe4" font-family="Cinzel,serif" font-weight="500" font-size="26" letter-spacing="5">MIEL DE</text>
      <text x="500" y="590" text-anchor="middle" fill="#f4efe4" font-family="Cinzel,serif" font-weight="600" font-size="74" letter-spacing="4.5">NIGELLE</text>
      <text x="500" y="708" text-anchor="middle" fill="#f4efe4" font-family="Cinzel,serif" font-weight="500" font-size="20" letter-spacing="4">PRÉPARÉ EN FRANCE</text>
      <text x="500" y="760" text-anchor="middle" fill="#f4efe4" font-family="Cinzel,serif" font-weight="500" font-size="26" letter-spacing="4.5">200 g</text>
    </svg>
    <div class="sub">PRÉPARÉ EN FRANCE y=708 · 200 g y=760</div>
  </div>

  <div class="col">
    <div class="cap">V4</div>
    <svg class="label" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="g4" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#dcc079"/><stop offset="0.5" stop-color="#c8a84b"/><stop offset="1" stop-color="#b9963c"/></linearGradient></defs>
      <circle cx="500" cy="500" r="500" fill="#0d1f16"/>
      <circle cx="500" cy="500" r="472" fill="none" stroke="url(#g4)" stroke-width="2.5" opacity="0.92"/>
      <image href="logo-gold.png" x="369" y="92" width="262" height="262"/>
      <text x="500" y="506" text-anchor="middle" fill="#f4efe4" font-family="Cinzel,serif" font-weight="500" font-size="26" letter-spacing="5">MIEL DE</text>
      <text x="500" y="590" text-anchor="middle" fill="#f4efe4" font-family="Cinzel,serif" font-weight="600" font-size="74" letter-spacing="4.5">NIGELLE</text>
      <text x="500" y="720" text-anchor="middle" fill="#f4efe4" font-family="Cinzel,serif" font-weight="500" font-size="20" letter-spacing="4">PRÉPARÉ EN FRANCE</text>
      <text x="500" y="772" text-anchor="middle" fill="#f4efe4" font-family="Cinzel,serif" font-weight="500" font-size="26" letter-spacing="4.5">200 g</text>
    </svg>
    <div class="sub">PRÉPARÉ EN FRANCE y=720 · 200 g y=772 (+12 px)</div>
  </div>
</body>
</html>
