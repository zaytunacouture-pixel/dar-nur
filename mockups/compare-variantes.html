<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dar Nūr — Comparaison variantes (Hibiscus / Costus)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  body{margin:0;background:#cfcabd;font-family:'Cinzel',serif;padding:24px;}
  .row{display:flex;justify-content:center;gap:40px;margin-bottom:10px;}
  .rowtitle{text-align:center;font-size:13px;letter-spacing:3px;color:#2f2f2a;margin:18px 0 6px;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .lab{width:300px;height:300px;filter:drop-shadow(0 14px 28px rgba(0,0,0,.26));}
  .cap{font-size:12px;letter-spacing:.5px;color:#2f2f2a;text-align:center;font-family:sans-serif;line-height:1.3;}
  .tag{font-family:sans-serif;font-weight:700;}
  .warn{color:#a23;} .ok{color:#2a6e3f;} .same{color:#7a6a1f;}
</style>
</head>
<body>
<div id="root"></div>
<script>
const ROWS=[
 {title:'MIEL HIBISCUS NIGELLE ZAMZAM', items:[
   {tag:'ACTUELLE', minor:'MIEL', hero:['HIBISCUS NIGELLE','ZAMZAM']},
   {tag:'VARIANTE 1', minor:'MIEL', hero:['HIBISCUS','NIGELLE ZAMZAM']},
 ]},
 {title:'MIEL COSTUS INDIEN NIGELLE', items:[
   {tag:'ACTUELLE', minor:'MIEL', hero:['COSTUS INDIEN','NIGELLE']},
   {tag:'VARIANTE (= actuelle)', minor:'MIEL', hero:['COSTUS INDIEN','NIGELLE']},
   {tag:'ALT. proposée', minor:'MIEL', hero:['COSTUS','INDIEN NIGELLE']},
 ]},
];
const root=document.getElementById('root');
let idx=0;
ROWS.forEach(r=>{
  const rt=document.createElement('div'); rt.className='rowtitle'; rt.textContent=r.title; root.appendChild(rt);
  const row=document.createElement('div'); row.className='row';
  r.items.forEach(it=>{
    const i=idx++;
    const cell=document.createElement('div'); cell.className='cell';
    const h=`<text class="maj" data-i="${i}" x="500" y="564" text-anchor="middle" fill="#f4efe4" font-weight="600" font-size="74" letter-spacing="4.5">${it.hero[0]}</text>
             <text class="maj" data-i="${i}" x="500" y="632" text-anchor="middle" fill="#f4efe4" font-weight="600" font-size="74" letter-spacing="4.5">${it.hero[1]}</text>`;
    cell.innerHTML=`
    <svg class="lab" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="g${i}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#dcc079"/><stop offset="0.5" stop-color="#c8a84b"/><stop offset="1" stop-color="#b9963c"/>
      </linearGradient></defs>
      <circle cx="500" cy="500" r="500" fill="#0d1f16"/>
      <circle cx="500" cy="500" r="472" fill="none" stroke="url(#g${i})" stroke-width="2.5" opacity="0.92"/>
      <image href="logo-gold.png" x="369" y="92" width="262" height="262"/>
      <text x="500" y="502" text-anchor="middle" fill="#f4efe4" font-weight="500" font-size="26" letter-spacing="5">${it.minor}</text>
      ${h}
      <text x="500" y="720" text-anchor="middle" fill="#f4efe4" font-weight="500" font-size="20" letter-spacing="4">PRÉPARÉ EN FRANCE</text>
      <text x="500" y="772" text-anchor="middle" fill="#f4efe4" font-weight="500" font-size="26" letter-spacing="4.5">200 g</text>
    </svg>
    <div class="cap" id="cap${i}"><span class="tag">${it.tag}</span><br>${it.hero[0]} / ${it.hero[1]}</div>`;
    row.appendChild(cell);
  });
  root.appendChild(row);
});
document.querySelectorAll('text').forEach(t=>t.setAttribute('font-family','Cinzel, serif'));
(async()=>{
  await document.fonts.ready; await new Promise(r=>setTimeout(r,350));
  const MAXW=720;
  document.querySelectorAll('.maj').forEach(el=>{
    const w=el.getComputedTextLength();
    if(w>MAXW){ const fs=Math.max(58, 74*MAXW/w); el.setAttribute('font-size', fs.toFixed(1)); el.dataset.fs=Math.round(fs); }
    else el.dataset.fs=74;
  });
  document.querySelectorAll('.cap').forEach(cap=>{
    const i=cap.id.replace('cap','');
    const lines=[...document.querySelectorAll('.maj[data-i="'+i+'"]')].map(e=>e.dataset.fs);
    const minFs=Math.min(...lines.map(Number));
    const cls = minFs>=74?'ok':(minFs>=68?'warn':'warn');
    cap.innerHTML += `<br><span class="tag ${cls}">lignes : ${lines.join(' / ')} px</span>`;
  });
  window.__done=true;
})();
</script>
</body>
</html>
