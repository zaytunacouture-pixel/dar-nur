<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dar Nūr — Planche V4 (14 miels)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  body{margin:0;background:#cfcabd;font-family:'Cinzel',serif;padding:24px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px 18px;max-width:1000px;margin:auto;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .lab{width:210px;height:210px;filter:drop-shadow(0 10px 20px rgba(0,0,0,.25));}
  .cap{font-size:11px;letter-spacing:.5px;color:#2f2f2a;text-align:center;font-family:sans-serif;line-height:1.3;}
  .warn{color:#a23;font-weight:700;font-family:sans-serif;}
  .ok{color:#2a6e3f;font-weight:700;font-family:sans-serif;}
</style>
</head>
<body>
<div class="grid" id="grid"></div>
<script>
const GR='url(#g)';
const DATA=[
 {fam:'France', minor:'MIEL DE', major:'NIGELLE', prov:'PRÉPARÉ EN FRANCE', bg:'#0d1f16', fg:'#f4efe4'},
 {fam:'France', minor:'MIEL', major:'APHRODISIAQUE', prov:'PRÉPARÉ EN FRANCE', bg:'#0d1f16', fg:'#f4efe4'},
 {fam:'France', minor:'MIEL', major:'SPIRULINE', prov:'PRÉPARÉ EN FRANCE', bg:'#0d1f16', fg:'#f4efe4'},
 {fam:'France', minor:'MIEL', major:'GINGEMBRE CURCUMA', prov:'PRÉPARÉ EN FRANCE', bg:'#0d1f16', fg:'#f4efe4'},
 {fam:'France', minor:'MIEL', major:'HIBISCUS NIGELLE ZAMZAM', prov:'PRÉPARÉ EN FRANCE', bg:'#0d1f16', fg:'#f4efe4'},
 {fam:'France', minor:'MIEL', major:'MORINGA NIGELLE', prov:'PRÉPARÉ EN FRANCE', bg:'#0d1f16', fg:'#f4efe4'},
 {fam:'France', minor:'MIEL', major:'GINGEMBRE FENUGREC', prov:'PRÉPARÉ EN FRANCE', bg:'#0d1f16', fg:'#f4efe4'},
 {fam:'France', minor:"MIEL D'", major:'AUBÉPINE', prov:'PRÉPARÉ EN FRANCE', bg:'#0d1f16', fg:'#f4efe4'},
 {fam:'France', minor:'MIEL', major:'COSTUS INDIEN NIGELLE', prov:'PRÉPARÉ EN FRANCE', bg:'#0d1f16', fg:'#f4efe4'},
 {fam:'France', minor:'MIEL', major:'SIDR DE JUJUBIER', prov:'PRÉPARÉ EN FRANCE', bg:'#0d1f16', fg:'#f4efe4'},
 {fam:'Importé', minor:'MIEL', major:'ROSE DE SIBÉRIE', prov:'SÉLECTIONNÉ PAR DAR NŪR', bg:'#0d1f16', fg:'#f4efe4'},
 {fam:'Importé', minor:'MIEL BLANC DU', major:'KIRGHIZISTAN', prov:'SÉLECTIONNÉ PAR DAR NŪR', bg:'#f4efe4', fg:'#0d1f16'},
 {fam:'Importé', minor:'MIEL DE', major:'FRAISE', prov:'SÉLECTIONNÉ PAR DAR NŪR', bg:'#0d1f16', fg:'#f4efe4'},
 {fam:'Importé', minor:'MIEL NOIR DE', major:'SHILAJIT', prov:'SÉLECTIONNÉ PAR DAR NŪR', bg:'#0d1f16', fg:'#f4efe4'},
];
const grid=document.getElementById('grid');
DATA.forEach((d,i)=>{
  const cell=document.createElement('div'); cell.className='cell';
  cell.innerHTML=`
  <svg class="lab" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="g${i}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dcc079"/><stop offset="0.5" stop-color="#c8a84b"/><stop offset="1" stop-color="#b9963c"/>
    </linearGradient></defs>
    <circle cx="500" cy="500" r="500" fill="${d.bg}"/>
    <circle cx="500" cy="500" r="472" fill="none" stroke="url(#g${i})" stroke-width="2.5" opacity="0.92"/>
    <image href="logo-gold.png" x="369" y="92" width="262" height="262"/>
    <text x="500" y="506" text-anchor="middle" fill="${d.fg}" font-weight="500" font-size="26" letter-spacing="5">${d.minor}</text>
    <text class="maj" x="500" y="590" text-anchor="middle" fill="${d.fg}" font-weight="600" font-size="74" letter-spacing="4.5">${d.major}</text>
    <text x="500" y="720" text-anchor="middle" fill="${d.fg}" font-weight="500" font-size="20" letter-spacing="4">${d.prov}</text>
    <text x="500" y="772" text-anchor="middle" fill="${d.fg}" font-weight="500" font-size="26" letter-spacing="4.5">200 g</text>
  </svg>
  <div class="cap" id="cap${i}">${d.minor} ${d.major}<br>${d.fam}</div>`;
  grid.appendChild(cell);
});
document.querySelectorAll('text').forEach(t=>t.setAttribute('font-family','Cinzel, serif'));
(async()=>{
  await document.fonts.ready; await new Promise(r=>setTimeout(r,300));
  const MAXW=820;
  document.querySelectorAll('.maj').forEach((el,i)=>{
    const w=el.getComputedTextLength();
    const cap=document.getElementById('cap'+i);
    if(w>MAXW){
      const fs=Math.max(30, 74*MAXW/w);
      el.setAttribute('font-size', fs.toFixed(1));
      cap.innerHTML += `<br><span class="warn">⚠ réduit à ${Math.round(fs)} px (≠74)</span>`;
    } else {
      cap.innerHTML += `<br><span class="ok">✓ 74 px</span>`;
    }
  });
  window.__fitDone=true;
})();
</script>
</body>
</html>
