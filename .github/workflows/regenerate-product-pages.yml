name: Régénère les fiches produit (Supabase → HTML statique)

# Régénère à la fois les fiches produit (/{slug}/) ET les blocs marqués
# <!-- AUTO:CATEGORY_*:START/END --> des pages catégories couvertes par
# scripts/generate-category-pages.mjs (Miels Gourmands pour l'instant) — les
# deux générateurs dépendent exactement des mêmes événements (tout produit,
# tout changement de catégorie), inutile de dupliquer les triggers Postgres
# pour ça.
#
# Déclenchement à la demande UNIQUEMENT — aucune exécution planifiée (cron) :
#   - repository_dispatch "regenerate-product-pages" : envoyé automatiquement
#     par les triggers Postgres Supabase sur `products` (tout produit,
#     n'importe quelle catégorie) et `categories` (le label d'une catégorie
#     apparaît sur chaque fiche produit) — voir supabase/sql/webhook_automation.sql.
#   - workflow_dispatch : bouton manuel "Run workflow" dans l'onglet Actions,
#     de secours si besoin d'une republication immédiate.
#
# Protection anti-boucle : ce workflow n'écoute jamais "push" — son propre
# commit ne peut donc jamais se re-déclencher lui-même. Le commit est en plus
# marqué [skip ci] par défense en profondeur.
on:
  repository_dispatch:
    types: [regenerate-product-pages]
  workflow_dispatch: {}

concurrency:
  group: regenerate-product-pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Générer les fiches produit depuis Supabase
        run: node scripts/generate-product-pages.mjs

      - name: Générer les pages catégories (blocs marqués) depuis Supabase
        run: node scripts/generate-category-pages.mjs

      - name: Vérifier si le contenu généré a réellement changé
        id: diff
        run: |
          # git add -A sans restriction de chemin : sans risque ici, le
          # checkout de ce job est toujours neuf (aucun fichier étranger ne
          # peut être présent), contrairement à un poste de travail persistant.
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Contenu identique au précédent — aucun commit créé."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Contenu modifié — commit à venir."
          fi

      - name: Committer et publier uniquement si changement réel
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: régénère les fiches produit depuis Supabase [skip ci]"

          # main peut avancer entre le checkout et ce push (autre commit
          # poussé pendant l'exécution du job) : on rebase sur le dernier
          # main et on retente plusieurs fois avant d'abandonner.
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "::warning::Push refusé (main a avancé) — tentative $i/5, rebase sur origin/main et nouvel essai."
            git fetch origin main
            git rebase origin/main
            sleep $((i * 3))
          done

          echo "::error::Échec du push après 5 tentatives (main avance plus vite que le rebase)."
          exit 1
